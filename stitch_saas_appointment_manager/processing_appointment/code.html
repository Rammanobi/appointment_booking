<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Processing Screen - Appointment Reminder System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#474646",
                        "surface-container-low": "#f4f3f3",
                        "primary": "#000000",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-secondary-fixed": "#1a1c1c",
                        "outline-variant": "#c4c7c7",
                        "surface": "#f9f9f9",
                        "secondary": "#5d5f5f",
                        "inverse-primary": "#c8c6c5",
                        "outline": "#747878",
                        "on-background": "#1a1c1c",
                        "surface-container": "#eeeeee",
                        "surface-variant": "#e2e2e2",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c6c6c7",
                        "secondary-container": "#dcdddd",
                        "on-secondary-container": "#5f6161",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#e5e2e1",
                        "on-surface": "#1a1c1c",
                        "surface-container-high": "#e8e8e8",
                        "on-primary": "#ffffff",
                        "surface-tint": "#5f5e5e",
                        "secondary-fixed": "#e2e2e2",
                        "on-tertiary-container": "#838484",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#1a1c1c",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-surface-variant": "#444748",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#c8c6c5",
                        "surface-container-highest": "#e2e2e2",
                        "tertiary": "#000000",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#e2e2e2",
                        "on-primary-fixed": "#1c1b1b",
                        "on-secondary-fixed-variant": "#454747",
                        "on-primary-container": "#858383",
                        "primary-container": "#1c1b1b",
                        "tertiary-container": "#1a1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "base": "4px",
                        "sm": "8px",
                        "margin-desktop": "32px",
                        "md": "16px",
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "label-sm": ["11px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .fade-text {
            animation: fadeInOut 4s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface h-screen w-screen flex flex-col items-center justify-center m-0 p-0 overflow-hidden font-body-md antialiased">
<!-- Processing Content Container -->
<main class="flex flex-col items-center text-center max-w-md px-margin-mobile md:px-margin-desktop w-full">
<!-- Large Minimalist Spinner -->
<div class="relative w-24 h-24 mb-xl">
<!-- Background Track -->
<svg class="absolute inset-0 w-full h-full text-surface-container-high" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="4"></circle>
</svg>
<!-- Animated Arc -->
<svg class="absolute inset-0 w-full h-full text-primary spinner" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-dasharray="70 200" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
<!-- Typography -->
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-md tracking-tight">
            Creating Appointment
        </h1>
<p class="font-body-lg text-body-lg text-secondary mb-xl max-w-sm">
            Saving appointment information and preparing confirmation email.
        </p>
<!-- Status Indicator Area -->
<div class="h-8 flex items-center justify-center bg-surface py-sm px-lg rounded-full border border-surface-variant">
<span class="font-label-md text-label-md text-on-surface-variant fade-text uppercase tracking-wider" id="status-text">
                Saving Data...
            </span>
</div>
</main>
<script>
        // Simple script to cycle through processing messages to simulate progress
        document.addEventListener('DOMContentLoaded', () => {
            const statusElement = document.getElementById('status-text');
            const messages = [
                "Saving Data...",
                "Preparing Email...",
                "Finalizing Appointment..."
            ];
            let currentIndex = 0;

            setInterval(() => {
                currentIndex = (currentIndex + 1) % messages.length;
                
                // Fade out slightly before changing text for smoother transition
                statusElement.style.opacity = 0;
                
                setTimeout(() => {
                    statusElement.textContent = messages[currentIndex];
                    statusElement.style.opacity = 1;
                }, 300); // Wait for fade out to complete (adjust if needed, though CSS animation handles the main fade)

            }, 2500); // Change message every 2.5 seconds
        });
    </script>
</body></html>
