<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Appointment Reminder System - Error</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#474646",
                        "surface-container-low": "#f4f3f3",
                        "primary": "#000000",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-secondary-fixed": "#1a1c1c",
                        "outline-variant": "#c4c7c7",
                        "surface": "#f9f9f9",
                        "secondary": "#5d5f5f",
                        "inverse-primary": "#c8c6c5",
                        "outline": "#747878",
                        "on-background": "#1a1c1c",
                        "surface-container": "#eeeeee",
                        "surface-variant": "#e2e2e2",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c6c6c7",
                        "secondary-container": "#dcdddd",
                        "on-secondary-container": "#5f6161",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#e5e2e1",
                        "on-surface": "#1a1c1c",
                        "surface-container-high": "#e8e8e8",
                        "on-primary": "#ffffff",
                        "surface-tint": "#5f5e5e",
                        "secondary-fixed": "#e2e2e2",
                        "on-tertiary-container": "#838484",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#1a1c1c",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "on-surface-variant": "#444748",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#c8c6c5",
                        "surface-container-highest": "#e2e2e2",
                        "tertiary": "#000000",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#e2e2e2",
                        "on-primary-fixed": "#1c1b1b",
                        "on-secondary-fixed-variant": "#454747",
                        "on-primary-container": "#858383",
                        "primary-container": "#1c1b1b",
                        "tertiary-container": "#1a1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "base": "4px",
                        "sm": "8px",
                        "margin-desktop": "32px",
                        "md": "16px",
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "label-sm": ["11px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Suppressed Shell Navigators as this is a focused, "dead end" error state -->
<main class="w-full max-w-lg">
<!-- Error Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl shadow-sm text-center flex flex-col items-center gap-lg">
<!-- Icon -->
<div class="w-16 h-16 rounded-full bg-error-container flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-error" style="font-size: 32px; font-variation-settings: 'FILL' 1;">error</span>
</div>
<!-- Content -->
<div class="flex flex-col gap-sm">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Something Went Wrong</h1>
<p class="font-body-md text-body-md text-on-surface-variant">We could not complete your request.</p>
</div>
<!-- Detailed Reasons (Glassmorphism inspired subtle box) -->
<div class="w-full bg-surface-container rounded-lg p-md text-left border border-outline-variant/50">
<p class="font-label-sm text-label-sm text-secondary uppercase tracking-wider mb-sm">Possible Reasons:</p>
<ul class="font-body-md text-body-md text-on-surface flex flex-col gap-xs">
<li class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" style="font-size: 16px;">wifi_off</span>
                        Network connection issue
                    </li>
<li class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" style="font-size: 16px;">database</span>
                        Database unavailable
                    </li>
<li class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline" style="font-size: 16px;">mail</span>
                        Email service unavailable
                    </li>
</ul>
</div>
<!-- Actions -->
<div class="flex flex-col sm:flex-row w-full gap-md mt-sm">
<button class="flex-1 bg-surface-container-lowest border border-outline-variant text-primary font-label-md text-label-md py-sm px-md rounded-DEFAULT hover:bg-surface-container transition-colors active:scale-95 duration-100 flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
                    Back To Form
                </button>
<button class="flex-1 bg-primary text-on-primary font-label-md text-label-md py-sm px-md rounded-DEFAULT hover:bg-on-primary-fixed-variant transition-colors active:scale-95 duration-100 flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-size: 18px;">refresh</span>
                    Try Again
                </button>
</div>
<div class="mt-md text-center">
<p class="font-label-sm text-label-sm text-outline">Error Code: ERR-503-DB</p>
<a class="font-label-md text-label-md text-secondary hover:text-primary underline mt-xs inline-block" href="#">Contact Support</a>
</div>
</div>
</main>
</body></html>
